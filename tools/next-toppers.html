<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>NEXT TOPPERS</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#000428,#004e92);
    }

    .card{
      background:#111827;
      padding:40px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 0 25px rgba(0,255,255,0.5);
    }

    h1{
      color:white;
      margin-bottom:25px;
      font-size:32px;
    }

    .btn{
      display:inline-block;
      padding:15px 35px;
      background:#00ffff;
      color:black;
      text-decoration:none;
      font-size:20px;
      font-weight:bold;
      border-radius:12px;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.08);
      box-shadow:0 0 20px #00ffff;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>NEXT TOPPERS</h1>

    <a class="btn"
   href="next-toppers-lock.html">

   OPEN
    </a>
  </div>

</body>
</html>
