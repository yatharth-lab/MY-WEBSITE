<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matrix MP3 Player</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:black;
  overflow:hidden;
  color:#00ff66;
}

/* MATRIX BACKGROUND */

canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* PLAYER */

.player{
  width:90%;
  max-width:420px;

  position:absolute;
  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  background:rgba(0,0,0,0.75);

  border:2px solid #00ff66;

  border-radius:20px;

  padding:25px;

  text-align:center;

  box-shadow:0 0 25px #00ff66;
}

h1{
  margin-bottom:20px;
  text-shadow:0 0 15px #00ff66;
}

/* MUSIC ICON */

.music-icon{
  font-size:80px;
  margin-bottom:20px;
  animation:pulse 2s infinite;
}

@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.1);
  }

  100%{
    transform:scale(1);
  }

}

/* SONG NAME */

.song-name{
  margin-bottom:20px;
  font-size:18px;
  word-break:break-word;
}

/* PROGRESS */

.progress-container{
  width:100%;
  height:8px;

  background:#111;

  border-radius:10px;

  overflow:hidden;

  margin-bottom:20px;
}

.progress{
  width:0%;
  height:100%;

  background:#00ff66;
}

/* TIME */

.time{
  display:flex;
  justify-content:space-between;

  font-size:14px;

  margin-bottom:20px;
}

/* BUTTONS */

.controls{
  display:flex;
  justify-content:center;
  gap:15px;
}

button{

  background:#00ff66;
  color:black;

  border:none;

  border-radius:12px;

  padding:12px 18px;

  cursor:pointer;

  font-size:16px;
  font-weight:bold;

  transition:.3s;
}

button:hover{
  transform:scale(1.08);
  box-shadow:0 0 15px #00ff66;
}

/* FILE INPUT */

.file-input{
  margin-top:20px;
}

input[type="file"]{
  color:#00ff66;
  width:100%;
}

@media(max-width:600px){

  .player{
    padding:18px;
  }

  .music-icon{
    font-size:60px;
  }

  button{
    padding:10px 15px;
    font-size:14px;
  }

}

</style>
</head>

<body>

<!-- MATRIX -->

<canvas id="matrix"></canvas>

<!-- PLAYER -->

<div class="player">

  <h1>MATRIX MP3</h1>

  <div class="music-icon">
    🎵
  </div>

  <div class="song-name" id="songName">
    No song selected
  </div>

  <!-- PROGRESS -->

  <div class="progress-container">

    <div class="progress" id="progress">
    </div>

  </div>

  <!-- TIME -->

  <div class="time">

    <span id="currentTime">
      0:00
    </span>

    <span id="duration">
      0:00
    </span>

  </div>

  <!-- CONTROLS -->

  <div class="controls">

    <button onclick="togglePlay()">
      ▶ / ⏸
    </button>

    <button onclick="stopMusic()">
      ⏹ STOP
    </button>

  </div>

  <!-- FILE -->

  <div class="file-input">

    <input
    type="file"
    id="fileInput"
    accept="audio/*">

  </div>

</div>

<!-- AUDIO -->

<audio id="audio"></audio>

<script>

/* =========================
   MATRIX EFFECT
========================= */

const canvas =
document.getElementById("matrix");

const ctx =
canvas.getContext("2d");

function resizeCanvas(){

  canvas.width =
  window.innerWidth;

  canvas.height =
  window.innerHeight;

}

resizeCanvas();

const letters =
"01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&";

const fontSize = 16;

let columns =
Math.floor(canvas.width/fontSize);

let drops = [];

for(let i=0;i<columns;i++){

  drops[i]=1;

}

function drawMatrix(){

  ctx.fillStyle =
  "rgba(0,0,0,0.05)";

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.fillStyle =
  "#00ff66";

  ctx.font =
  fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){

    const text =
    letters.charAt(
      Math.floor(
        Math.random()*letters.length
      )
    );

    ctx.fillText(
      text,
      i*fontSize,
      drops[i]*fontSize
    );

    if(
      drops[i]*fontSize >
      canvas.height &&
      Math.random() > 0.975
    ){
      drops[i]=0;
    }

    drops[i]++;

  }

}

setInterval(drawMatrix,35);

window.addEventListener(
"resize",
resizeCanvas
);

/* =========================
   MUSIC PLAYER
========================= */

const audio =
document.getElementById("audio");

const fileInput =
document.getElementById("fileInput");

const songName =
document.getElementById("songName");

const progress =
document.getElementById("progress");

const currentTime =
document.getElementById("currentTime");

const duration =
document.getElementById("duration");

/* FILE SELECT */

fileInput.addEventListener(
"change",
function(){

  const file =
  this.files[0];

  if(file){

    const url =
    URL.createObjectURL(file);

    audio.src = url;

    songName.textContent =
    file.name;

    audio.play();

  }

});

/* PLAY / PAUSE */

async function togglePlay(){

  if(!audio.src){

    alert(
    "Please select an MP3 file first."
    );

    return;

  }

  if(audio.paused){

    await audio.play();

  }else{

    audio.pause();

  }

}

/* STOP */

function stopMusic(){

  audio.pause();

  audio.currentTime = 0;

}

/* PROGRESS */

audio.addEventListener(
"timeupdate",
()=>{

  if(audio.duration){

    const percent =
    (audio.currentTime /
    audio.duration) * 100;

    progress.style.width =
    percent + "%";

    currentTime.textContent =
    formatTime(audio.currentTime);

    duration.textContent =
    formatTime(audio.duration);

  }

});

/* FORMAT TIME */

function formatTime(time){

  const mins =
  Math.floor(time/60);

  const secs =
  Math.floor(time%60);

  return mins + ":" +
  (secs < 10 ? "0"+secs : secs);

}

</script>

</body>
</html>
