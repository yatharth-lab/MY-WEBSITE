<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stories List | Stories World</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#050816,#091428,#0f172a);
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* HEADER */

header{
text-align:center;
padding:24px 14px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.08);
position:sticky;
top:0;
z-index:100;
}

header h1{
font-size:32px;
font-weight:800;
margin-bottom:5px;
background:linear-gradient(to right,#ff00ff,#00f7ff,#00ff99);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.brand{
font-size:11px;
color:#94a3b8;
margin-bottom:8px;
letter-spacing:2px;
opacity:0.8;
}

header p{
font-size:15px;
color:#cbd5e1;
}

/* TOP BAR */

.top-bar{
max-width:950px;
margin:22px auto 10px;
padding:0 20px;
display:flex;
gap:14px;
align-items:center;
flex-wrap:wrap;
}

.story-count{
padding:12px 18px;
border-radius:14px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
color:#00f7ff;
font-size:14px;
font-weight:700;
backdrop-filter:blur(10px);
}

.sort-btn{
padding:13px 18px;
border:none;
border-radius:14px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
color:#00f7ff;
font-size:14px;
font-weight:700;
cursor:pointer;
backdrop-filter:blur(10px);
transition:0.3s;
}

.sort-btn:hover{
transform:scale(1.05);
}

.top-bar input{
flex:1;
min-width:220px;
padding:14px 16px;
border:none;
outline:none;
border-radius:16px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
color:white;
font-size:14px;
backdrop-filter:blur(10px);
}

.top-bar input::placeholder{
color:#94a3b8;
}


/* CONTAINER */

.container{
max-width:950px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:1fr;
gap:18px;
}

/* CARD */

.card{
position:relative;
overflow:hidden;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:22px;
padding:22px;
transition:0.3s;
backdrop-filter:blur(10px);
display:flex;
flex-direction:column;
justify-content:space-between;
min-height:250px;
}

.card::before{
content:"";
position:absolute;
top:-40px;
right:-40px;
width:100px;
height:100px;
background:rgba(0,247,255,0.08);
border-radius:50%;
}

.card::after{
content:"📖";
position:absolute;
bottom:-8px;
right:12px;
font-size:70px;
opacity:0.05;
}

.card:hover{
transform:translateY(-5px);
border-color:rgba(0,247,255,0.5);
box-shadow:0 8px 25px rgba(0,0,0,0.35);
}

.badge-wrap{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:12px;
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:999px;
background:rgba(0,247,255,0.12);
color:#00f7ff;
font-size:11px;
font-weight:700;
letter-spacing:1px;
width:fit-content;
}

.new-badge{
background:rgba(255,0,255,0.12);
color:#ff7cf3;
}

.saved-badge{
background:rgba(0,255,153,0.12);
color:#00ff99;
}

.card h2{
font-size:24px;
margin-bottom:12px;
color:#00f7ff;
position:relative;
z-index:1;
line-height:1.4;
}

.card p{
font-size:15px;
line-height:1.8;
color:#cbd5e1;
position:relative;
z-index:1;
}

.story-meta{
margin-top:14px;
font-size:13px;
color:#94a3b8;
}

.card a{
display:inline-block;
margin-top:18px;
padding:11px 16px;
border-radius:12px;
background:linear-gradient(to right,#00f7ff,#00ff99);
color:#001018;
text-decoration:none;
font-size:14px;
font-weight:700;
transition:0.25s;
position:relative;
z-index:1;
width:fit-content;
}

.card a:hover{
transform:scale(1.05);
}

.card a::after{
content:" →";
}

/* EMPTY */

.empty{
text-align:center;
padding:40px 20px;
color:#94a3b8;
font-size:16px;
}

/* MOBILE */
@media(max-width:600px){

header{
padding:18px 10px;
}

header h1{
font-size:24px;
}

.brand{
font-size:10px;
}

header p{
font-size:13px;
}

.top-bar{
padding:0 14px;
gap:10px;
margin:16px auto 8px;
}

.story-count{
padding:10px 14px;
font-size:13px;
}

.sort-btn{
padding:10px 14px;
font-size:13px;
}

.top-bar input{
width:100%;
padding:12px 14px;
font-size:13px;
}

.container{
padding:14px;
gap:14px;
}

.card{
padding:16px;
border-radius:16px;
min-height:auto;
}

.card h2{
font-size:18px;
}

.card p{
font-size:13px;
line-height:1.7;
}

.story-meta{
font-size:12px;
}

.badge{
font-size:10px;
padding:5px 10px;
}

.card a{
padding:10px 14px;
font-size:13px;
}

.empty{
font-size:14px;
padding:30px 15px;
}

}

/* DESKTOP */

@media(min-width:800px){

.container{
grid-template-columns:repeat(2,1fr);
}

}

</style>
</head>

<body>

<header>

<h1>Stories World</h1>

<div class="brand">
By Yatharth
</div>

<p id="catTitle">
Stories
</p>

</header>

<!-- TOP BAR -->

<div class="top-bar">

<div class="story-count" id="storyCount">
0 Stories
</div>

<button class="sort-btn" id="sortBtn">
Sort A-Z
</button>

<input
type="text"
id="searchInput"
placeholder="Search stories..."
>

</div>


<!-- STORIES -->

<div class="container" id="storiesBox"></div>

<script src="stories.js"></script>

<script>

/* ORIGINAL AUTO SYSTEM SAME */

const params = new URLSearchParams(location.search);

const category = params.get("category");

document.getElementById("catTitle").innerText =
category + " Stories";

const filtered = storiesData.filter(s =>
s.category.toLowerCase() === category.toLowerCase()
);

const box = document.getElementById("storiesBox");

/* STORY COUNT */

document.getElementById("storyCount")
.innerText =
filtered.length + " Stories";

/* CONTINUE READING */

const savedStory =
localStorage.getItem("bookmark_story");



/* RENDER STORIES */

function renderStories(data){

box.innerHTML = "";

if(data.length === 0){

box.innerHTML = `

<div class="empty">
No matching stories found.
</div>

`;

return;

}

data.forEach((story,index) => {

const readingTime =
Math.max(1,
Math.ceil(
(story.desc.length + story.title.length)
/ 120
)
);

const isSaved =
savedStory == story.id;

box.innerHTML += `

<div class="card">

<div class="badge-wrap">

<div class="badge">
${story.category}
</div>

${index < 2 ? `
<div class="badge new-badge">
NEW
</div>
` : ""}

${isSaved ? `
<div class="badge saved-badge">
BOOKMARKED
</div>
` : ""}

</div>

<h2>${story.title}</h2>

<p>
${story.desc}
</p>

<div class="story-meta">
⏱ ${readingTime} min read
</div>

<a href="story.html?id=${story.id}">
Read Story
</a>

</div>

`;

});

}

renderStories(filtered);

/* SEARCH */

const searchInput =
document.getElementById("searchInput");

searchInput.addEventListener("input", () => {

const value =
searchInput.value.toLowerCase();

const searchedStories =
filtered.filter(story =>

story.title.toLowerCase().includes(value)

||

story.desc.toLowerCase().includes(value)

);

renderStories(searchedStories);

});

/* SORT */

let sorted = false;

document.getElementById("sortBtn")
.onclick = () => {

sorted = !sorted;

const cloned = [...filtered];

if(sorted){

cloned.sort((a,b) =>
a.title.localeCompare(b.title)
);

document.getElementById("sortBtn")
.innerText = "Original";

}

else{

document.getElementById("sortBtn")
.innerText = "Sort A-Z";

}

renderStories(
sorted ? cloned : filtered
);

};

</script>

</body>
</html>
