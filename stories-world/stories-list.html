<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stories List | Stories World</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050816;
color:white;
}

header{
text-align:center;
padding:20px;
background:rgba(255,255,255,0.05);
position:sticky;
top:0;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
display:grid;
gap:15px;
}

.card{
background:rgba(255,255,255,0.06);
padding:16px;
border-radius:15px;
border:1px solid rgba(255,255,255,0.08);
}

.card h2{
color:#00f7ff;
margin:0 0 10px;
}

.badge{
display:inline-block;
padding:4px 10px;
border-radius:20px;
font-size:12px;
background:#00f7ff22;
color:#00f7ff;
margin-bottom:8px;
}

a{
display:inline-block;
margin-top:10px;
padding:10px 14px;
border-radius:10px;
background:linear-gradient(to right,#00f7ff,#00ff99);
color:black;
text-decoration:none;
font-weight:bold;
}

input{
width:90%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
}
</style>
</head>

<body>

<header>
<h2 id="catTitle">Stories</h2>
<div id="storyCount">0 Stories</div>
<input id="searchInput" placeholder="Search stories...">
</header>

<div class="container" id="storiesBox"></div>

<script src="stories.js"></script>

<script>

// ✅ STEP 1: SAFE DATA CHECK
if(!window.storiesData){
alert("stories.js load nahi ho raha");
}

// ✅ STEP 2: SAFE CATEGORY (IMPORTANT FIX)
const params = new URLSearchParams(location.search);
const category = (params.get("category") || "").toLowerCase();

// ✅ STEP 3: SAFE FILTER (NO CRASH)
let filtered = storiesData || [];

if(category){
filtered = filtered.filter(s =>
(s.category || "").toLowerCase() === category
);
}

// title set
document.getElementById("catTitle").innerText =
category ? category.toUpperCase() + " STORIES" : "ALL STORIES";

// count
document.getElementById("storyCount").innerText =
filtered.length + " Stories";

const box = document.getElementById("storiesBox");

// ✅ STEP 4: RENDER FUNCTION
function render(list){

box.innerHTML = "";

if(list.length === 0){
box.innerHTML = "<p style='text-align:center'>No stories found</p>";
return;
}

list.forEach(s => {

box.innerHTML += `
<div class="card">

<div class="badge">${s.category || "General"}</div>

<h2>${s.title}</h2>

<p>${s.desc}</p>

<a href="story.html?id=${s.id}">Read Story</a>

</div>
`;
});

}

render(filtered);

// ✅ STEP 5: SEARCH (SAFE)
document.getElementById("searchInput").addEventListener("input",(e)=>{

const val = e.target.value.toLowerCase();

const result = filtered.filter(s =>
(s.title || "").toLowerCase().includes(val) ||
(s.desc || "").toLowerCase().includes(val)
);

render(result);
});

</script>

</body>
</html>
