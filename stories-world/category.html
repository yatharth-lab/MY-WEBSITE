<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stories World</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#050816,#091428,#0f172a);
color:white;
}

header{
text-align:center;
padding:30px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

header h1{
font-size:40px;
margin-bottom:5px;
background:linear-gradient(to right,#ff00ff,#00f7ff,#00ff99);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.brand{
font-size:14px;
color:#94a3b8;
margin-bottom:10px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:20px;
padding:20px;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px rgba(0,255,255,0.3);
}

.card h2{
color:#00f7ff;
}

.card p{
color:#cbd5e1;
font-size:14px;
}

.card a{
display:inline-block;
margin-top:15px;
padding:10px 15px;
border-radius:10px;
background:linear-gradient(to right,#00f7ff,#00ff99);
color:black;
text-decoration:none;
font-weight:bold;
}

footer{
text-align:center;
padding:20px;
margin-top:30px;
border-top:1px solid rgba(255,255,255,0.1);
color:#94a3b8;
}

  @media (max-width: 600px) {

  header {
    padding: 15px 10px;
  }

  header h1 {
    font-size: 28px;
  }

  .brand {
    font-size: 12px;
  }

  header p {
    font-size: 13px;
    margin: 5px 0 0;
  }

  }
</style>
</head>
<body>

<header>
<h1>Stories World</h1>
<div class="brand">By Yatharth</div>
<p>Choose Your Favorite Category</p>
</header>

<div class="container" id="categoryBox"></div>

<footer>
© 2026 Stories World | Yatharth Tools
</footer>

<script src="stories.js"></script>

<script>

const categories = [...new Set(storiesData.map(s=>s.category))];

const box = document.getElementById("categoryBox");

categories.forEach(cat=>{

box.innerHTML += `

<div class="card">
<h2>${cat}</h2>
<p>Explore amazing ${cat} stories.</p>
<a href="stories-list.html?category=${cat}">
Open Category
</a>
</div>

`;

});

</script>

</body>
</html>
