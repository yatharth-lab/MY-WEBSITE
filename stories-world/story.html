<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Story | Stories World</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#050816,#091428,#0f172a);
color:white;
min-height:100vh;
padding-bottom:40px;
overflow-x:hidden;
transition:0.3s;
}

/* HEADER */

header{
text-align:center;
padding:28px 15px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

header h1{
font-size:34px;
font-weight:800;
margin-bottom:4px;
background:linear-gradient(to right,#ff00ff,#00f7ff,#00ff99);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.brand{
font-size:11px;
color:#94a3b8;
margin-bottom:8px;
letter-spacing:2px;
opacity:0.8;
}

header p{
font-size:15px;
color:#cbd5e1;
}

body.lightMode .storyCard h2{
color:#2563eb;
}

body.lightMode header p,
body.lightMode .brand{
color:#475569;
}

/* TOOLS */

.toolsBar{
position:sticky;
top:0;
z-index:120;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
padding:14px;
background:rgba(5,8,22,0.75);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.toolsBar button{
padding:10px 16px;
border:none;
border-radius:14px;
background:rgba(255,255,255,0.06);
color:#00f7ff;
font-weight:700;
cursor:pointer;
backdrop-filter:blur(10px);
transition:0.25s;
}

.toolsBar button:hover{
transform:scale(1.05);
background:rgba(0,247,255,0.12);
}

/* PROGRESS BAR */

.progressWrap{
position:fixed;
top:0;
left:0;
width:100%;
height:4px;
z-index:200;
}

.progressBar{
height:100%;
width:0%;
background:linear-gradient(to right,#00f7ff,#00ff99);
}

/* INFO */

.readingInfo{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
max-width:1200px;
margin:18px auto 0;
padding:0 20px;
color:#94a3b8;
font-size:14px;
}

/* STORY BOX */

.storyBox{
max-width:1200px;
margin:auto;
padding:20px;
}

/* STORY CARD */

.storyCard{
margin-top:20px;
}

/* TITLE */

.storyCard h2{
font-size:32px;
margin-bottom:22px;
color:#00f7ff;
line-height:1.3;
}

/* PAGE */

.page{
position:relative;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:24px;
padding:34px;
margin-top:20px;
line-height:2;
font-size:19px;
color:#cbd5e1;
white-space:pre-wrap;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
word-break:break-word;
width:100%;
transition:0.3s;
}

.page::after{
content:"📖";
position:absolute;
bottom:10px;
right:16px;
font-size:60px;
opacity:0.05;
}

/* PAGE NUMBER */

.pageNumber{
margin-top:12px;
text-align:center;
font-size:14px;
color:#00f7ff;
opacity:0.8;
}

/* BUTTON */

.back{
display:inline-block;
margin-top:30px;
padding:11px 18px;
border-radius:12px;
background:linear-gradient(to right,#00f7ff,#00ff99);
color:#001018;
text-decoration:none;
font-size:14px;
font-weight:700;
transition:0.25s;
}

.back:hover{
transform:scale(1.05);
}

/* LIGHT MODE */

body.lightMode{
background:#f1f5f9;
color:#111827;
}

body.lightMode .page{
background:white;
color:#1e293b;
border-color:#dbeafe;
}

body.lightMode header{
background:rgba(255,255,255,0.9);
}

body.lightMode .toolsBar{
background:rgba(255,255,255,0.85);
}

body.lightMode .readingInfo{
color:#334155;
}

/* MOBILE */

@media(max-width:600px){

header{
padding:24px 14px;
}

header h1{
font-size:30px;
}

.storyBox{
padding:14px;
}

.storyCard h2{
font-size:27px;
margin-bottom:18px;
}

.page{
padding:22px;
font-size:17px;
line-height:1.9;
border-radius:20px;
}

.back{
width:100%;
text-align:center;
padding:14px;
font-size:15px;
}

.toolsBar{
padding:12px 8px;
gap:8px;
}

.toolsBar button{
font-size:13px;
padding:9px 12px;
}

.readingInfo{
font-size:13px;
padding:0 14px;
}

}

</style>
</head>

<body>

<!-- PROGRESS -->

<div class="progressWrap">
<div class="progressBar" id="progressBar"></div>
</div>

<header>

<h1>Stories World</h1>

<div class="brand">
By Yatharth
</div>

<p>
Story Reading Page
</p>

</header>

<!-- TOOLS -->

<div class="toolsBar">

<button id="minusFont">
A-
</button>

<button id="plusFont">
A+
</button>

<button id="themeBtn">
Theme
</button>

<button id="bookmarkBtn">
★
</button>

<button id="shareBtn">
Share
</button>

</div>

<!-- INFO -->

<div class="readingInfo">

<div id="readingTime">
0 min read
</div>

<div>
Auto Save Enabled
</div>

</div>

<div class="storyBox">

<div class="storyCard">

<h2 id="title"></h2>

<div id="storyPages"></div>

<a class="back" href="#">
Go Back
</a>

</div>

</div>

<script src="stories.js"></script>

<script>

/* ORIGINAL AUTO SYSTEM SAME */

const params = new URLSearchParams(location.search);

const id = params.get("id");

const story = storiesData.find(
s => s.id == id
);

if(!story){

document.querySelector(".storyCard").innerHTML = `

<h2>
Story not found
</h2>

`;

}

else{

document.getElementById("title").innerText =
story.title;

fetch(story.file)

.then(res => res.text())

.then(data => {

const container =
document.getElementById("storyPages");

/* READING TIME */

const words =
data.split(/\s+/).length;

const mins =
Math.max(1, Math.ceil(words / 200));

document.getElementById(
"readingTime"
).innerText =

mins + " min read";

/* AUTO PAGE SPLIT */

const charsPerPage = 3000;

const totalPages =
Math.ceil(data.length / charsPerPage);

for(let i = 0; i < totalPages; i++){

const text =
data.slice(
i * charsPerPage,
(i + 1) * charsPerPage
);

container.innerHTML += `

<div class="page">

${text.replace(/\r?\n(?!\r?\n)/g, " ")}

</div>

<div class="pageNumber">
Page ${i + 1}
</div>

`;

}

/* RESTORE POSITION */

const saved = localStorage.getItem(
"story_" + story.id
);

if(saved){

setTimeout(() => {

window.scrollTo(0, saved);

}, 300);

}

});

document.querySelector(".back").href =

"stories-list.html?category=" +

story.category;

}

/* FONT SIZE */

let currentSize = 19;

document.getElementById("plusFont")
.onclick = () => {

currentSize += 1;

document.querySelectorAll(".page")
.forEach(page => {

page.style.fontSize =
currentSize + "px";

});

};

document.getElementById("minusFont")
.onclick = () => {

currentSize -= 1;

if(currentSize < 14){
currentSize = 14;
}

document.querySelectorAll(".page")
.forEach(page => {

page.style.fontSize =
currentSize + "px";

});

};

/* PROGRESS */

window.addEventListener("scroll", () => {

const totalHeight =

document.documentElement.scrollHeight
- window.innerHeight;

const progress =

(window.scrollY / totalHeight) * 100;

document.getElementById("progressBar")
.style.width = progress + "%";

/* AUTO SAVE */

if(story){

localStorage.setItem(

"story_" + story.id,

window.scrollY

);

}

});

/* THEME */

document.getElementById("themeBtn")
.onclick = () => {

document.body.classList.toggle(
"lightMode"
);

};

/* BOOKMARK */

document.getElementById("bookmarkBtn")
.onclick = () => {

if(story){

localStorage.setItem(
"bookmark_story",
story.id
);

alert("Story Bookmarked");

}

};

/* SHARE */

document.getElementById("shareBtn")
.onclick = async () => {

if(navigator.share && story){

try{

await navigator.share({

title: story.title,
url: location.href

});

}

catch(err){}

}

else{

navigator.clipboard.writeText(
location.href
);

alert("Link Copied");

}

};

</script>

</body>
</html>
