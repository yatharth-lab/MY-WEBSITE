<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Story | Stories World</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#050816,#091428,#0f172a);
color:white;
min-height:100vh;
padding-bottom:40px;
}

/* HEADER */

header{
text-align:center;
padding:28px 15px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.08);
position:sticky;
top:0;
z-index:100;
}

header h1{
font-size:34px;
font-weight:800;
margin-bottom:4px;
background:linear-gradient(to right,#ff00ff,#00f7ff,#00ff99);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.brand{
font-size:11px;
color:#94a3b8;
margin-bottom:8px;
letter-spacing:2px;
opacity:0.8;
}

header p{
font-size:15px;
color:#cbd5e1;
}

/* STORY BOX */

.storyBox{
max-width:950px;
margin:auto;
padding:20px;
}

/* STORY CARD */

.storyCard{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:24px;
padding:26px;
margin-top:25px;
backdrop-filter:blur(10px);
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.storyCard h2{
font-size:30px;
margin-bottom:22px;
color:#00f7ff;
line-height:1.3;
}

/* PAGE */

.page{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:20px;
padding:30px;
margin-top:30px;
line-height:2;
font-size:17px;
color:#cbd5e1;
white-space:pre-line;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
word-break:break-word;
}

/* PAGE NUMBER */

.pageNumber{
margin-top:12px;
text-align:center;
font-size:14px;
color:#00f7ff;
opacity:0.8;
}

/* BUTTON */

.back{
display:inline-block;
margin-top:30px;
padding:11px 18px;
border-radius:12px;
background:linear-gradient(to right,#00f7ff,#00ff99);
color:#001018;
text-decoration:none;
font-size:14px;
font-weight:700;
transition:0.25s;
}

.back:hover{
transform:scale(1.05);
}

/* MOBILE */

@media(max-width:600px){

header{
padding:24px 14px;
}

header h1{
font-size:32px;
}

.storyBox{
padding:18px;
}

.storyCard{
padding:24px;
border-radius:22px;
margin-top:18px;
}

.storyCard h2{
font-size:27px;
margin-bottom:20px;
}

.page{
padding:22px;
font-size:16px;
line-height:1.9;
}

.back{
width:100%;
text-align:center;
padding:14px;
font-size:15px;
}

}

</style>
</head>
<body>

<header>

<h1>Stories World</h1>

<div class="brand">
By Yatharth
</div>

<p>
Story Reading Page
</p>

</header>

<div class="storyBox">

<div class="storyCard">

<h2 id="title"></h2>

<div id="storyPages"></div>

<a class="back" href="#">
Go Back
</a>

</div>

</div>

<script src="stories.js"></script>

<script>

const params = new URLSearchParams(location.search);

const id = params.get("id");

const story = storiesData.find(
s => s.id == id
);

if(!story){

document.querySelector(".storyCard").innerHTML = `

<h2>
Story not found
</h2>

`;

}

else{

document.getElementById("title").innerText =
story.title;

fetch(story.file)

.then(res => res.text())

.then(data => {

const container =
document.getElementById("storyPages");

/* AUTO PAGE SPLIT */

const charsPerPage = 3000;

const totalPages =
Math.ceil(data.length / charsPerPage);

for(let i = 0; i < totalPages; i++){

const text =
data.slice(
i * charsPerPage,
(i + 1) * charsPerPage
);

container.innerHTML += `

<div class="page">

${text}

</div>

<div class="pageNumber">
Page ${i + 1}
</div>

`;

}

});

document.querySelector(".back").href =

"stories-list.html?category=" +

story.category;

}

</script>

</body>
</html>
